  pwn-aarch64:
    image: pwnlab:aarch64
    build:
      context: .
      dockerfile: Dockerfile.pwnlab.aarch64
    working_dir: /work
    volumes:
      - ./:/work
      - pwn-cache:/root/.cache
      - pwn-gdb:/root/.gdb
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
      - PWNLIB_NOTERM=0
    profiles: ["aarch64", "arm64"]

  revlab:
    image: revlab:ubuntu22.04
    build:
      context: .
      dockerfile: Dockerfile.revlab-ubuntu22.04
    working_dir: /work
    init: true
    pull_policy: if_not_present
    volumes:
      - ./:/work
      - pwn-cache:/root/.cache
      - pwn-gdb:/root/.gdb
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp=unconfined
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - PYTHONIOENCODING=utf-8
      - PWNLIB_NOTERM=0
      - GOPATH=/root/go
      - PATH=/usr/local/go/bin:/root/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    profiles: ["revlab", "rev", "forensics"]

  pwn-mipsel:
