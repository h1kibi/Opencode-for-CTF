services:
  pwn-ubuntu18:
    image: pwnlab:ubuntu18.04
    build:
      context: .
      dockerfile: Dockerfile.pwnlab.ubuntu18.04
    working_dir: /work
    volumes:
      - ./:/work
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    stdin_open: true
    tty: true
    profiles: ["ubuntu18"]

  pwn-ubuntu20:
    image: pwnlab:ubuntu20.04
    build:
      context: .
      dockerfile: Dockerfile.pwnlab.ubuntu20.04
    working_dir: /work
    volumes:
      - ./:/work
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    stdin_open: true
    tty: true
    profiles: ["ubuntu20"]

  pwn-ubuntu22:
    image: pwnlab:ubuntu22.04
    build:
      context: .
      dockerfile: Dockerfile.pwnlab.ubuntu22.04
    working_dir: /work
    volumes:
      - ./:/work
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    stdin_open: true
    tty: true
    profiles: ["ubuntu22", "default"]

  pwn-ubuntu24:
    image: pwnlab:ubuntu24.04
    build:
      context: .
      dockerfile: Dockerfile.pwnlab.ubuntu24.04
    working_dir: /work
    volumes:
      - ./:/work
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    stdin_open: true
    tty: true
    profiles: ["ubuntu24"]

  pwn-i386:
    image: pwnlab:i386-ubuntu20.04
    build:
      context: .
      dockerfile: Dockerfile.pwnlab.i386-ubuntu20.04
    working_dir: /work
    volumes:
      - ./:/work
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    stdin_open: true
    tty: true
    profiles: ["i386"]

  pwn-general:
    image: pwnlab:general-ubuntu22.04
    build:
      context: .
      dockerfile: Dockerfile.pwnlab.general-ubuntu22.04
    working_dir: /work
    init: true
    volumes:
      - ./:/work
      - pwn-cache:/root/.cache
      - pwn-gdb:/root/.gdb
      - pwn-history:/root/.local/share/pwn-history
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - PYTHONIOENCODING=utf-8
      - PWNLIB_NOTERM=0
    profiles: ["general", "pwn"]

  pwn-heavy:
    image: pwnlab:heavy-ubuntu22.04
    build:
      context: .
      dockerfile: Dockerfile.pwnlab.heavy-ubuntu22.04
    working_dir: /work
    init: true
    volumes:
      - ./:/work
      - pwn-cache:/root/.cache
      - pwn-gdb:/root/.gdb
      - pwn-history:/root/.local/share/pwn-history
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - PYTHONIOENCODING=utf-8
      - PWNLIB_NOTERM=0
    profiles: ["heavy"]

