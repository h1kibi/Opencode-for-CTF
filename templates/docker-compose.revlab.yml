    working_dir: /work
    volumes:
      - ./:/work
      - pwn-cache:/root/.cache
      - pwn-gdb:/root/.gdb
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    stdin_open: true
    tty: true
    environment:
